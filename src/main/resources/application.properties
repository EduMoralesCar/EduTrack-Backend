spring.application.name=EduTrack

# DATABASE CONNECTION (POSTGRESQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/edutrack}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# SERVER PORT CONFIGURATION
server.port=${PORT:8081}

# JWT (cambiar en producción / Azure App Settings)
edutrack.jwt.secret=${JWT_SECRET:EduTrackDevSecretKeyMin32CharsLong!!}
edutrack.jwt.expiration-ms=86400000

# SpringDoc / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.persist-authorization=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
springdoc.override-with-generic-response=false

# SERVER MIME MAPPINGS
server.servlet.mime-mapping.pdf=application/pdf
server.servlet.mime-mapping.png=image/png
server.servlet.mime-mapping.jpg=image/jpeg
server.servlet.mime-mapping.jpeg=image/jpeg
server.servlet.mime-mapping.doc=application/msword
server.servlet.mime-mapping.docx=application/vnd.openxmlformats-officedocument.wordprocessingml.document

# FILE UPLOAD LIMITS
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
